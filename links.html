<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joe Giuffrida</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e0d;
    min-height: 100dvh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: clamp(36px,10vw,60px) clamp(20px,6vw,32px) clamp(36px,10vw,60px);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  }

  .page { width: 100%; max-width: 400px; }

  .top {
    opacity: 0;
    transform: translateY(14px);
    animation: up 0.75s cubic-bezier(0.22,1,0.36,1) 0.05s forwards;
    margin-bottom: clamp(24px,6vw,36px);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .name {
    font-size: clamp(32px,10vw,44px);
    font-weight: 700;
    letter-spacing: -0.035em;
    color: #f2ede4;
    line-height: 1;
    margin-bottom: 10px;
    display: block;
  }

  .tagline {
    font-size: clamp(13px,3.5vw,15px);
    font-weight: 300;
    font-style: italic;
    color: rgba(242,237,228,0.4);
    line-height: 1.5;
    letter-spacing: 0.005em;
  }

  .links { display: flex; flex-direction: column; gap: 8px; margin-bottom: clamp(24px,6vw,32px); }

  .link-wrap { opacity: 0; transform: translateY(14px); }
  .link-wrap:nth-child(1) { animation: up 0.7s cubic-bezier(0.22,1,0.36,1) 0.35s forwards; }
  .link-wrap:nth-child(2) { animation: up 0.7s cubic-bezier(0.22,1,0.36,1) 0.47s forwards; }
  .link-wrap:nth-child(3) { animation: up 0.7s cubic-bezier(0.22,1,0.36,1) 0.59s forwards; }

  .link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    background: #181714;
    border: 1px solid rgba(57,49,223,0.5);
    border-radius: 12px;
    text-decoration: none;
    width: 100%;
    cursor: pointer;
    color: #f2ede4;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.3s cubic-bezier(0.22,1,0.36,1), border-color 0.3s cubic-bezier(0.22,1,0.36,1), transform 0.3s cubic-bezier(0.22,1,0.36,1);
    overflow: hidden;
  }
  .link:hover { background: #1d1b18; border-color: rgba(57,49,223,0.85); transform: translateY(-2px); }
  .link:active { transform: scale(0.975); transition-duration: 0.1s; }

  .link-portfolio {
    flex-direction: column;
    align-items: stretch;
    padding: 0;
    gap: 0;
  }

  .neon-hero {
    width: 100%;
    overflow: hidden;
    border-radius: 10px 10px 0 0;
    
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    
  }
  .neon-hero img {
    width: 100%;
    height: auto;
    display: block;
  }

  .link-bottom {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
  }

  .link-body { flex: 1; min-width: 0; }

  .link-kicker {
    display: block;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(242,237,228,0.28);
    font-weight: 500;
    margin-bottom: 3px;
  }

  .link-title {
    display: block;
    font-size: clamp(14px,3.8vw,15px);
    font-weight: 600;
    color: #f2ede4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.01em;
  }

  .arrow {
    width: 30px; height: 30px; min-width: 30px;
    border-radius: 50%;
    border: 1px solid rgba(57,49,223,0.35);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.3s ease, transform 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  .arrow svg {
    width: 10px; height: 10px;
    stroke: rgba(242,237,228,0.35);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), stroke 0.3s ease;
    display: block;
  }
  .link:hover .arrow { border-color: rgba(57,49,223,0.8); }
  .link:hover .arrow svg { stroke: rgba(242,237,228,0.7); }

  .single-thumb {
    width: 52px; height: 52px; min-width: 52px;
    border-radius: 7px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .single-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .book-thumb {
    width: 40px; height: 50px; min-width: 40px;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.6);
  }
  .book-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .music-btn {
    background: #181714;
    border: 1px solid rgba(57,49,223,0.5);
    padding: 0;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.3s cubic-bezier(0.22,1,0.36,1), border-color 0.3s cubic-bezier(0.22,1,0.36,1), transform 0.3s cubic-bezier(0.22,1,0.36,1);
    display: block;
    text-align: left;
  }
  .music-btn:hover { background: #1d1b18; border-color: rgba(57,49,223,0.85); transform: translateY(-2px); }
  .music-btn:active { transform: scale(0.975); transition-duration: 0.1s; }

  .music-inner {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
  }

  .music-btn .arrow svg { transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), stroke 0.3s ease; }
  .music-btn.open .arrow svg { transform: rotate(90deg); }
  .music-btn:hover .arrow { border-color: rgba(57,49,223,0.8); }
  .music-btn:hover .arrow svg { stroke: rgba(242,237,228,0.7); }

  .stream-drawer {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.45s cubic-bezier(0.22,1,0.36,1), opacity 0.35s ease;
  }
  .stream-drawer.open { max-height: 220px; opacity: 1; }

  .stream-inner { display: flex; flex-direction: column; gap: 4px; padding: 4px 0 0; }

  .stream-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #131211;
    border: 1px solid rgba(57,49,223,0.25);
    border-radius: 10px;
    text-decoration: none;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.25s ease, border-color 0.25s ease;
  }
  .stream-link:hover { background: #1a1917; border-color: rgba(57,49,223,0.5); }
  .stream-link:active { transform: scale(0.975); }

  .stream-icon { width: 28px; height: 28px; min-width: 28px; border-radius: 6px; flex-shrink: 0; }
  .stream-icon svg { width: 28px; height: 28px; display: block; }

  .stream-name {
    font-size: 13px;
    font-weight: 500;
    color: rgba(242,237,228,0.75);
    letter-spacing: -0.01em;
    flex: 1;
  }

  .stream-ext svg {
    width: 9px; height: 9px;
    stroke: rgba(242,237,228,0.2);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    display: block;
  }

  .foot {
    opacity: 0;
    animation: fadein 0.8s ease 0.78s forwards;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .foot-loc {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(242,237,228,0.2);
    font-weight: 400;
  }
  .foot-yr { font-size: 11px; color: rgba(242,237,228,0.14); font-weight: 300; }


  /* Ambient glow */
  .glow {
    position: fixed;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: min(420px, 105vw);
    height: 350px;
    background: radial-gradient(ellipse at center, rgba(57,49,223,0.4) 0%, transparent 68%);
    pointer-events: none;
    animation: glow-drift 14s ease-in-out infinite;
    z-index: 0;
  }
  .page { position: relative; z-index: 1; }

  /* Avatar */
  .avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    overflow: hidden;
    margin-bottom: 14px;
    border: 1.5px solid rgba(57,49,223,0.4);
    box-shadow: 0 0 0 4px rgba(57,49,223,0.08);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* Arrow tap micro-interaction */
  .link:active .arrow svg { transform: translateX(3px); stroke: rgba(242,237,228,0.9); }
  .music-btn:active .arrow svg { transform: rotate(90deg) translateY(-3px); }

  @keyframes glow-drift {
    0%   { transform: translateX(-120%) translateY(0vh); }
    25%  { transform: translateX(20%)   translateY(5vh); }
    50%  { transform: translateX(20%)   translateY(55vh); }
    75%  { transform: translateX(-120%) translateY(50vh); }
    100% { transform: translateX(-120%) translateY(0vh); }
  }
  @keyframes up { to { opacity: 1; transform: translateY(0); } }
  @keyframes fadein { to { opacity: 1; } }
</style>
</head>
